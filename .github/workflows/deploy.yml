name: CI/CD — ws-landing-admin

# ─────────────────────────────────────────────────────────────────────────────
# Depende de ws-commons e ws-security-client (GitHub Packages).
#
# Secrets necessários (Settings → Secrets → Actions):
#   EC2_HOST       — hostname ou IP da instância EC2
#   EC2_USER       — usuário SSH (ex.: ubuntu)
#   EC2_SSH_KEY    — chave privada SSH (PEM)
#   GH_DEPLOY_TOKEN — token com permissão read:packages
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo do disparo manual'
        required: false
        default: 'Deploy manual'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  JAVA_VERSION: '21'
  SERVICE: ws-landing-admin

jobs:
  ci:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Configure Maven for GitHub Packages
        env:
          TOKEN: ${{ secrets.GH_DEPLOY_TOKEN }}
        run: |
          mkdir -p ~/.m2
          echo "<settings><servers><server><id>github-commons</id><username>faelslima</username><password>${TOKEN}</password></server><server><id>github-security-client</id><username>faelslima</username><password>${TOKEN}</password></server></servers></settings>" > ~/.m2/settings.xml

      - name: Build & Test
        run: mvn --batch-mode clean package

      - name: Resumo do build
        if: always()
        run: |
          echo "### 🔨 Build ${{ env.SERVICE }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Resultado:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: 🚀 Build & Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: read
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Configure Maven for GitHub Packages
        env:
          TOKEN: ${{ secrets.GH_DEPLOY_TOKEN }}
        run: |
          mkdir -p ~/.m2
          echo "<settings><servers><server><id>github-commons</id><username>faelslima</username><password>${TOKEN}</password></server><server><id>github-security-client</id><username>faelslima</username><password>${TOKEN}</password></server></servers></settings>" > ~/.m2/settings.xml

      - name: Build & Test
        run: mvn --batch-mode clean package

      - name: Copiar JAR para EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: target/${{ env.SERVICE }}.jar
          target: /home/ubuntu/

      - name: Deploy, Health Check & Rollback automático
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: false
          script: |
            set -euo pipefail
            SERVICE="${{ env.SERVICE }}"
            JAR="/opt/apps/${SERVICE}.jar"
            BAK="/opt/apps/${SERVICE}.jar.bkp"
            NEW="/home/ubuntu/target/${SERVICE}.jar"

            echo "━━━ Deploy ${SERVICE} • $(date -u +'%Y-%m-%dT%H:%M:%SZ') ━━━"

            if [ -f "$JAR" ]; then
              sudo cp "$JAR" "$BAK"
              echo "💾 Backup criado."
            fi

            sudo systemctl stop "${SERVICE}.service" 2>/dev/null || true
            echo "⏹️  Serviço parado."

            sudo mv "$NEW" "$JAR"
            sudo chown logoseti:logoseti "$JAR"
            sudo chmod 640 "$JAR"
            echo "📦 JAR instalado."

            sudo systemctl start "${SERVICE}.service"
            echo "▶️  Serviço iniciado. Aguardando health check (máx. 60s)..."

            for i in $(seq 1 12); do
              sleep 5
              if sudo systemctl is-active --quiet "${SERVICE}.service"; then
                echo "✅ Serviço ativo após $((i * 5))s. Deploy concluído com sucesso."
                sudo rm -f "$BAK"
                exit 0
              fi
              echo "  ⏳ Aguardando... ($i/12)"
            done

            echo "❌ Health check falhou após 60s. Iniciando rollback..."
            sudo systemctl stop "${SERVICE}.service" 2>/dev/null || true
            if [ -f "$BAK" ]; then
              sudo mv "$BAK" "$JAR"
              sudo chown logoseti:logoseti "$JAR" 2>/dev/null || true
              sudo systemctl start "${SERVICE}.service" 2>/dev/null || true
              echo "⏪ Rollback concluído. Versão anterior restaurada."
            else
              echo "⚠️  Sem backup disponível — rollback não executado."
            fi
            exit 1

      - name: Resumo do deploy
        if: always()
        run: |
          echo "### 🚀 Deploy ${{ env.SERVICE }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Disparado por:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

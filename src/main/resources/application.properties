spring.profiles.active=dev,local
spring.application.name=${spring.profiles.active}-ws-landing-admin

# JPA
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=landing

# Hikari
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.connection-init-sql=SET TIME ZONE 'UTC'

# Logging
logging.file.name=logs/${spring.application.name}.log
logging.level.br.eti.logos=INFO

# RabbitMQ
spring.rabbitmq.listener.simple.default-requeue-rejected=true

rabbitmq.landing.exchange=${spring.profiles.active}.landing.exchange
rabbitmq.landing.subscription.webhook.queue=${spring.profiles.active}.landing.subscription.webhook.queue
rabbitmq.landing.subscription.webhook.routing.key=${spring.profiles.active}.landing.subscription.webhook.routing.key
rabbitmq.landing.onboarding.queue=${spring.profiles.active}.landing.onboarding.queue
rabbitmq.landing.onboarding.routing.key=${spring.profiles.active}.landing.onboarding.routing.key
rabbitmq.landing.alert.queue=${spring.profiles.active}.landing.alert.queue
rabbitmq.landing.alert.routing.key=${spring.profiles.active}.landing.alert.routing.key

# Saga: onboarding provisioning (landing → security)
rabbitmq.landing.saga.provisioning.queue=${spring.profiles.active}.landing.saga.provisioning.queue
rabbitmq.landing.saga.provisioning.routing.key=${spring.profiles.active}.landing.saga.provisioning.routing.key
# Saga: onboarding completed (security → landing)
rabbitmq.landing.saga.completed.queue=${spring.profiles.active}.landing.saga.completed.queue
rabbitmq.landing.saga.completed.routing.key=${spring.profiles.active}.landing.saga.completed.routing.key

# PagBank
pagbank.subscriptions.url=${PAGBANK_SUBSCRIPTIONS_URL:https://sandbox.api.assinaturas.pagseguro.com}
pagbank.orders.url=${PAGBANK_ORDERS_URL:https://sandbox.api.pagseguro.com}
pagbank.token=${PAGBANK_TOKEN:}
pagbank.webhook.url=${PAGBANK_WEBHOOK_URL:}
pagbank.webhook.idempotency.ttl-minutes=1440

# Feign
spring.cloud.openfeign.httpclient.hc5.enabled=true
spring.cloud.openfeign.client.config.default.connect-timeout=10000
spring.cloud.openfeign.client.config.default.read-timeout=30000

# Security Client (ws-security)
security.client.url=${api.security.url}
security.client.public-paths=/actuator/health,/public/**,/webhooks/**

# SendGrid
sendgrid.api.key=${SENDGRID_API_KEY:}
sendgrid.from=${SENDGRID_FROM:naoresponda@logos.eti.br}
sendgrid.from.name=${SENDGRID_FROM_NAME:i12}

# Alert
alert.user-limit.threshold-percent=80
alert.user-limit.cron=0 0 8 * * *
alert.email.admin=${ALERT_EMAIL_ADMIN:admin@i12.logos.br}

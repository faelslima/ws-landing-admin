spring.profiles.active=dev,local
spring.application.name=${spring.profiles.active}-ws-landing-admin

# JPA
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=landing

# Hikari
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.connection-init-sql=SET TIME ZONE 'UTC'

# Logging
logging.file.name=logs/${spring.application.name}.log
logging.level.br.eti.logos=INFO

# RabbitMQ
spring.rabbitmq.listener.simple.default-requeue-rejected=true

rabbitmq.landing.exchange=${app.env}.landing.exchange
rabbitmq.landing.subscription.webhook.queue=${app.env}.landing.subscription.webhook.queue
rabbitmq.landing.subscription.webhook.routing.key=${app.env}.landing.subscription.webhook.routing.key
rabbitmq.landing.onboarding.queue=${app.env}.landing.onboarding.queue
rabbitmq.landing.onboarding.routing.key=${app.env}.landing.onboarding.routing.key
rabbitmq.landing.alert.queue=${app.env}.landing.alert.queue
rabbitmq.landing.alert.routing.key=${app.env}.landing.alert.routing.key

# Saga: onboarding provisioning (landing → security)
rabbitmq.landing.saga.provisioning.queue=${app.env}.landing.saga.provisioning.queue
rabbitmq.landing.saga.provisioning.routing.key=${app.env}.landing.saga.provisioning.routing.key
# Saga: onboarding completed (security → landing)
rabbitmq.landing.saga.completed.queue=${app.env}.landing.saga.completed.queue
rabbitmq.landing.saga.completed.routing.key=${app.env}.landing.saga.completed.routing.key
# Saga: license suspension (landing → security)
rabbitmq.landing.saga.license.suspension.queue=${app.env}.landing.saga.license.suspension.queue
rabbitmq.landing.saga.license.suspension.routing.key=${app.env}.landing.saga.license.suspension.routing.key
# Saga: license reactivation (landing → security)
rabbitmq.landing.saga.license.reactivation.queue=${app.env}.landing.saga.license.reactivation.queue
rabbitmq.landing.saga.license.reactivation.routing.key=${app.env}.landing.saga.license.reactivation.routing.key

# PagBank
pagbank.subscriptions.url=${PAGBANK_SUBSCRIPTIONS_URL:https://sandbox.api.assinaturas.pagseguro.com}
pagbank.orders.url=${PAGBANK_ORDERS_URL:https://sandbox.api.pagseguro.com}
pagbank.token=${PAGBANK_TOKEN:}
pagbank.webhook.url=${PAGBANK_WEBHOOK_URL:}
pagbank.webhook.idempotency.ttl-minutes=1440

# Feign
spring.cloud.openfeign.httpclient.hc5.enabled=true
spring.cloud.openfeign.client.config.default.connect-timeout=10000
spring.cloud.openfeign.client.config.default.read-timeout=30000

# Security Client (ws-security)
security.client.url=${api.security.url}
security.client.public-paths=/actuator/health,/public/**,/webhooks/**

# Email (Amazon SES via SMTP)
spring.mail.host=${SES_SMTP_HOST:email-smtp.sa-east-1.amazonaws.com}
spring.mail.port=${SES_SMTP_PORT:587}
spring.mail.username=${SES_SMTP_USERNAME:}
spring.mail.password=${SES_SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

email.from=${EMAIL_FROM:naoresponda@logos.eti.br}
email.from.name=${EMAIL_FROM_NAME:i12}

# Alert
alert.user-limit.threshold-percent=80
alert.user-limit.cron=0 0 8 * * *
alert.email.admin=${ALERT_EMAIL_ADMIN:rafael@logos.eti.br}

# URL do frontend de landing (usada nos emails de retry)
app.landing.url=${LANDING_URL:https://i12.logos.br}

server.address=0.0.0.0
server.port=8090

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
server.error.include-stacktrace=never

security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

pagbank.subscriptions.url=https://api.assinaturas.pagseguro.com
pagbank.orders.url=https://api.pagseguro.com
pagbank.token=${PAGBANK_TOKEN}
pagbank.webhook.url=${PAGBANK_WEBHOOK_URL}

api.security.url=${API_SECURITY_URL}

sendgrid.api.key=${SENDGRID_API_KEY}
sendgrid.from=${SENDGRID_FROM:naoresponda@logos.eti.br}
sendgrid.from.name=${SENDGRID_FROM_NAME:i12}
